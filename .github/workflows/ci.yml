name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runs_on }}
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs_on: ubuntu-24.04
            platform: linux-amd64
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
            platform: linux-arm64
          - name: macos-arm64
            runs_on: macos-26
            platform: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Cachix
        uses: cachix/cachix-action@v16
        with:
          name: pdf-sign
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build (flake)
        run: |
          nix build .#pdf-sign --out-link result

      - name: Test (flake checks)
        run: |
          nix flake check -L

      - name: Collect artifact
        run: |
          mkdir -p dist
          cp -L result/bin/pdf-sign "dist/pdf-sign-${{ runner.os }}-$(uname -m)"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pdf-sign-${{ matrix.name }}
          path: dist/*

      # --- OCI image build and push (all platforms) ---

      - name: Build streaming image
        run: |
          nix build .#image --out-link image

      - name: Install skopeo
        run: |
          command -v skopeo || nix profile install nixpkgs#skopeo

      - name: Generate skopeo policy
        run: |
          printf '{"default":[{"type":"reject"}],"transports":{"docker-archive":{"":[{"type":"insecureAcceptAnything"}]},"docker":{"ghcr.io/%s":[{"type":"insecureAcceptAnything"}]}}}\n' \
            "${{ github.repository }}" > "$RUNNER_TEMP/skopeo-policy.json"

      - name: Push image to GHCR
        if: github.event.pull_request.head.repo.fork != true
        run: |
          ./image | gzip --fast | skopeo copy \
            --policy-file "$RUNNER_TEMP/skopeo-policy.json" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker-archive:/dev/stdin \
            "docker://$IMAGE:sha-${GITHUB_SHA::7}-${{ matrix.platform }}"

  docker:
    name: Docker Manifest
    if: github.event.pull_request.head.repo.fork != true
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          TAGS="-t $IMAGE:sha-$SHA_SHORT"

          if [[ "$GITHUB_REF" == refs/heads/main ]]; then
            TAGS="$TAGS -t $IMAGE:latest"
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS -t $IMAGE:$VERSION"
            TAGS="$TAGS -t $IMAGE:${VERSION#v}"

            MINOR="${VERSION%.*}"
            TAGS="$TAGS -t $IMAGE:${MINOR#v}"

            TAGS="$TAGS -t $IMAGE:latest"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Create multi-platform manifest
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          docker buildx imagetools create \
            ${{ steps.tags.outputs.tags }} \
            "$IMAGE:sha-$SHA_SHORT-linux-amd64" \
            "$IMAGE:sha-$SHA_SHORT-linux-arm64" \
            "$IMAGE:sha-$SHA_SHORT-darwin-arm64"

      - name: Get manifest digest
        id: digest
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          DIGEST=$(docker buildx imagetools inspect "$IMAGE:sha-$SHA_SHORT" --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Generate image attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  shell:
    name: Dev Shell (${{ matrix.name }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs_on: ubuntu-24.04
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
          - name: macos-arm64
            runs_on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Cachix
        uses: cachix/cachix-action@v16
        with:
          name: pdf-sign
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build dev shell
        run: |
          nix develop --command true
