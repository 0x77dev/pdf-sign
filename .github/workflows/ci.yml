name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runs_on }}
    defaults:
      run:
        shell: nix develop --command bash -eo pipefail {0}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs_on: ubuntu-24.04
            platform: linux-amd64
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
            platform: linux-arm64
          - name: macos-arm64
            runs_on: macos-26
            platform: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Cachix
        if: ${{ github.event_name != 'push' }}
        uses: cachix/cachix-action@v17
        with:
          name: pdf-sign

      - name: Cachix (trusted push)
        if: ${{ github.event_name == 'push' }}
        uses: cachix/cachix-action@v17
        with:
          name: pdf-sign
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build (flake)
        run: |
          nix build .#pdf-sign --out-link result

      - name: Test (flake checks)
        run: |
          nix flake check -L

      - name: Collect artifact
        run: |
          mkdir -p dist
          cp -L result/bin/pdf-sign "dist/pdf-sign-${{ runner.os }}-$(uname -m)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pdf-sign-${{ matrix.name }}
          path: dist/*

  attest-artifacts:
    name: Attest artifact (${{ matrix.name }})
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
          - name: linux-arm64
          - name: macos-arm64
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: pdf-sign-${{ matrix.name }}
          path: dist

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

  publish-image:
    name: Publish image (${{ matrix.name }})
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    needs: build
    runs-on: ${{ matrix.runs_on }}
    defaults:
      run:
        shell: nix develop --command bash -eo pipefail {0}
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs_on: ubuntu-24.04
            platform: linux-amd64
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
            platform: linux-arm64
          - name: macos-arm64
            runs_on: macos-26
            platform: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Cachix
        uses: cachix/cachix-action@v17
        with:
          name: pdf-sign
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build streaming image
        run: |
          nix build .#image --out-link image

      - name: Configure containers registry lookup
        run: |
          cat > "$RUNNER_TEMP/registries.conf" <<'EOF'
          unqualified-search-registries = []
          EOF
          echo "CONTAINERS_REGISTRIES_CONF=$RUNNER_TEMP/registries.conf" >> "$GITHUB_ENV"
          echo "CONTAINERS_REGISTRIES_CONF_OVERRIDE=" >> "$GITHUB_ENV"

      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          skopeo login ghcr.io \
            --username "$GHCR_USERNAME" \
            --password "$GHCR_TOKEN" \
            --compat-auth-file "$HOME/.docker/config.json"

      - name: Push image to GHCR
        id: push-image
        env:
          GHCR_REPOSITORY: ${{ github.repository }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          printf '{"default":[{"type":"reject"}],"transports":{"docker-archive":{"":[{"type":"insecureAcceptAnything"}]},"docker":{"ghcr.io/%s":[{"type":"insecureAcceptAnything"}]}}}\n' \
            "$GHCR_REPOSITORY" > "$RUNNER_TEMP/skopeo-policy.json"
          ./image | gzip --fast | skopeo \
            --policy "$RUNNER_TEMP/skopeo-policy.json" \
            copy \
            --digestfile "$RUNNER_TEMP/image-digest" \
            docker-archive:/dev/stdin \
            "docker://$IMAGE:sha-${GITHUB_SHA::7}-$PLATFORM"
          echo "digest=$(cat "$RUNNER_TEMP/image-digest")" >> "$GITHUB_OUTPUT"

      - name: Attest image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push-image.outputs.digest }}
          push-to-registry: true

  docker:
    name: Docker Manifest
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    needs: publish-image
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: nix develop --command bash -eo pipefail {0}
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Cachix
        uses: cachix/cachix-action@v17
        with:
          name: pdf-sign
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Configure containers registry lookup
        run: |
          cat > "$RUNNER_TEMP/registries.conf" <<'EOF'
          unqualified-search-registries = []
          EOF
          echo "CONTAINERS_REGISTRIES_CONF=$RUNNER_TEMP/registries.conf" >> "$GITHUB_ENV"
          echo "CONTAINERS_REGISTRIES_CONF_OVERRIDE=" >> "$GITHUB_ENV"

      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          skopeo login ghcr.io \
            --username "$GHCR_USERNAME" \
            --password "$GHCR_TOKEN" \
            --compat-auth-file "$HOME/.docker/config.json"

      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          TAGS="$IMAGE:sha-$SHA_SHORT"

          if [[ "$GITHUB_REF" == refs/heads/main ]]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS,$IMAGE:$VERSION"
            TAGS="$TAGS,$IMAGE:${VERSION#v}"

            MINOR="${VERSION%.*}"
            TAGS="$TAGS,$IMAGE:${MINOR#v}"

            TAGS="$TAGS,$IMAGE:latest"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Create multi-platform manifest
        env:
          MANIFEST_TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          IFS=',' read -ra TAG_ARRAY <<< "$MANIFEST_TAGS"

          FIRST_TAG="${TAG_ARRAY[0]}"
          EXTRA_TAGS=()
          for tag in "${TAG_ARRAY[@]:1}"; do
            EXTRA_TAGS+=(--tags "${tag##*:}")
          done

          manifest-tool push from-args \
            --platforms linux/amd64,linux/arm64,darwin/arm64 \
            --template "$IMAGE:sha-$SHA_SHORT-OS-ARCH" \
            --target "$FIRST_TAG" \
            "${EXTRA_TAGS[@]}"

      - name: Get manifest digest
        id: digest
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          DIGEST=$(skopeo inspect "docker://$IMAGE:sha-$SHA_SHORT" | jq -r '.Digest')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Attest manifest
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Verify attestations
        env:
          GH_TOKEN: ${{ github.token }}
          MANIFEST_TAGS: ${{ steps.tags.outputs.tags }}
          GHCR_REPOSITORY: ${{ github.repository }}
        run: |
          sleep 5
          IFS=',' read -ra TAG_ARRAY <<< "$MANIFEST_TAGS"
          for tag in "${TAG_ARRAY[@]}"; do
            echo "Verifying $tag..."
            gh attestation verify "oci://$tag" --repo "$GHCR_REPOSITORY"
          done
